syntax = "proto3";

package data_agent;

import "google/protobuf/timestamp.proto";

option go_package = "/proto;proto";

message Empty {}

message Host {
    int64 id = 1;
    string hostname = 2;
    string os = 3;
    string platform = 4;
    string platform_ver = 5;
    string kernel_ver = 6;
}

message HostList {
    repeated Host hosts = 1;
}

message DiskMetric {
    string path = 1;
    uint64 total = 2;
    uint64 used = 3;
    uint64 free = 4;
    double used_percent = 5;
}

message NetMetric {
    string name = 1;
    uint64 bytes_sent = 2;
    uint64 bytes_recv = 3;
    uint64 packets_sent = 4;
    uint64 packets_recv = 5;
    uint64 err_in = 6;
    uint64 err_out = 7;
    uint64 drop_in = 8;
    uint64 drop_out = 9;
}

message Metric {
    int64 id = 1;
    int64 host_id = 2;
    uint64 uptime = 3;
    double cpu = 4;
    double ram = 5;
    repeated DiskMetric disk = 6;
    repeated NetMetric network = 7;
    google.protobuf.Timestamp time = 8;
}

message MetricList {
    repeated Metric metrics = 1;
}

message HostName {
    string hostname = 1;
}

message MetricRequest {
    string hostname = 1;
    int32 limit = 2;
}

service HostService {
    rpc ListHosts(Empty) returns (HostList);
    rpc GetHost(HostName) returns (Host);
}

service MetricService {
    rpc ListMetrics(MetricRequest) returns (MetricList);
    rpc GetLatestMetrics(Empty) returns (MetricList);
}
